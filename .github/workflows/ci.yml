name: NIDALUM CI/CD Quality Gate

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main

jobs:
  quality-gate:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'apps/web/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/web

      - name: Run ESLint
        run: npm run lint
        working-directory: ./apps/web

      - name: Check TypeScript Compilation
        run: npx tsc --noEmit
        working-directory: ./apps/web

      # Optionnel : décommenter quand des tests unitaires existent
      # - name: Run Unit Tests
      #   run: npm run test
      #   working-directory: ./apps/web

      - name: Verify Production Build
        run: npm run build
        working-directory: ./apps/web
        env:
          NEXT_TELEMETRY_DISABLED: 1
